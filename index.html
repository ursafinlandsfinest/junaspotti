<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>🚂 JunaSpotti</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#070a0e;--panel:#0d1117;--p2:#111820;--bdr:#1c2530;
      --amber:#f59f00;--blue:#1971c2;--green:#2f9e44;--greenb:#69db7c;
      --org:#e8590c;--blueb:#74c0fc;--text:#c9d1d9;--tdim:#586069;
      --fh:'Barlow Condensed',sans-serif;--fm:'IBM Plex Mono',monospace;
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:var(--fm);
      display:flex;
      flex-direction:column;
      height:100dvh;
    }

    #hdr{background:var(--panel);border-bottom:2px solid var(--bdr);padding:0 12px;height:50px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:50;}

    #map{flex:1;min-height:0;position:relative;overflow:hidden;}

    /* =========================
       ✔️ SCROLL FIX (AINOA MUUTOS)
       ========================= */
    #sp-list,
    #rp-scroll {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }

    /* estää Leafletin “touch lockin” */
    #lpanel,
    #rpanel {
      touch-action: none;
    }

    /* SIDE PANELS (ORIGINALI RAKENNE SÄILYY) */
    #lpanel,#rpanel{
      position:absolute;top:0;bottom:0;z-index:490;
      background:var(--panel);
      display:flex;flex-direction:column;
      transition:transform .28s cubic-bezier(.4,0,.2,1);
    }

    #lpanel{left:0;width:min(290px,88vw);transform:translateX(-100%);}
    #rpanel{right:0;width:min(270px,88vw);transform:translateX(100%);}

    #lpanel.open{transform:translateX(0);}
    #rpanel.open{transform:translateX(0);}

    #pov{position:absolute;inset:0;z-index:480;background:rgba(0,0,0,.45);display:none;}
    #pov.show{display:block;}
  </style>
</head>

<body>

<div id="hdr">
  <div>🚂 JunaSpotti</div>
</div>

<div id="map"></div>
<div id="pov" onclick="closePanels()"></div>

<script>
const API='https://rata.digitraffic.fi/api/v1';
const REFRESH=12000;
const STOP_KMH=2;
const N_THRESH=55;

const map=L.map('map',{center:[64.2,26.0],zoom:6});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const LG={trains:L.layerGroup().addTo(map)};

let allTrains=[],prevPos={},stopCycles={},firstStop={},fetchingLocs=false;

function hav(a,b,c,d){
  const dL=(c-a)*Math.PI/180,dO=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dO/2)**2;
  return 6371*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function nightEst(num,speed,lat,lng){
  const now=new Date(),h=now.getHours();

  if(speed>STOP_KMH){
    stopCycles[num]=0;
    delete firstStop[num];
    return{status:'moving',prob:0};
  }

  stopCycles[num]=(stopCycles[num]||0)+1;
  if(!firstStop[num]) firstStop[num]=now;

  let p=0;
  if(((now-firstStop[num])/60000)>60)p+=25;
  if(h>=20||h<6)p+=30;

  return{status:p>=N_THRESH?'night':'stopped',prob:Math.min(p,99)};
}

function render(data){
  LG.trains.clearLayers();
  data.forEach(t=>{
    L.marker([t.location.coordinates[1],t.location.coordinates[0]])
      .addTo(LG.trains);
  });
}

async function fetchLocs(){
  if(fetchingLocs) return;
  fetchingLocs=true;

  try{
    const res=await fetch(`${API}/train-locations/latest/`);
    const data=await res.json();
    allTrains=data;
    render(allTrains);
  }finally{
    fetchingLocs=false;
  }
}

/* SCROLL FIX TOUCH SAFE */
['lpanel','rpanel'].forEach(id=>{
  const el=document.getElementById(id);

  ['touchstart','touchmove','wheel'].forEach(ev=>{
    el.addEventListener(ev,e=>{
      e.stopPropagation();
    },{passive:true});
  });
});

function closePanels(){
  document.getElementById('pov').classList.remove('show');
}

fetchLocs();
setInterval(fetchLocs,REFRESH);
</script>

</body>
</html>
