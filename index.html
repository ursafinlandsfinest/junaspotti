<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚆 JunaSpotti — Suomen junaseuranta</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #07090b;
      --panel:     #0e1217;
      --border:    #1e252e;
      --amber:     #f59f00;
      --amber-dim: #a36b00;
      --red:       #e03131;
      --blue:      #339af0;
      --green:     #40c057;
      --muted:     #4a5568;
      --text:      #cdd5e0;
      --text-dim:  #6b7a8d;
      --font-head: 'Barlow Condensed', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      z-index: 1000;
    }

    .logo {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--amber);
      white-space: nowrap;
      user-select: none;
    }
    .logo span { color: var(--text-dim); font-weight: 400; }

    .filters {
      display: flex;
      gap: 6px;
      margin-left: auto;
      flex-wrap: nowrap;
      overflow-x: auto;
    }
    .filters::-webkit-scrollbar { display: none; }

    .btn {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      padding: 5px 11px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      letter-spacing: .3px;
    }
    .btn:hover  { border-color: var(--amber-dim); color: var(--text); }
    .btn.active { background: var(--amber); color: #000; border-color: var(--amber); font-weight: 700; }

    .layer-btns {
      display: flex;
      gap: 5px;
      margin-left: 8px;
      border-left: 1px solid var(--border);
      padding-left: 8px;
    }
    .layer-btn {
      font-size: 11px;
      padding: 5px 9px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      font-family: var(--font-mono);
    }
    .layer-btn.on { border-color: #339af0; color: #339af0; }
    .layer-btn.on.green { border-color: var(--green); color: var(--green); }
    .layer-btn.on.amber { border-color: var(--amber); color: var(--amber); }

    /* ── STATUS BAR ── */
    #statusbar {
      background: #0b0e12;
      border-bottom: 1px solid var(--border);
      padding: 3px 14px;
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      gap: 16px;
      align-items: center;
      flex-shrink: 0;
      letter-spacing: .3px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }
    .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    .dot.err  { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── MAP ── */
    #map {
      flex: 1;
      min-height: 0;
    }

    /* ── POPUP ── */
    .leaflet-popup-content-wrapper {
      background: var(--panel) !important;
      border: 1px solid var(--border) !important;
      border-radius: 6px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,.6) !important;
      color: var(--text) !important;
      font-family: var(--font-mono) !important;
      font-size: 12px !important;
      padding: 0 !important;
    }
    .leaflet-popup-tip { background: var(--panel) !important; }
    .leaflet-popup-content { margin: 0 !important; }

    .popup-train {
      padding: 12px 14px;
      min-width: 180px;
    }
    .popup-train .num {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 900;
      color: var(--amber);
      letter-spacing: 1px;
      line-height: 1;
    }
    .popup-train .row {
      display: flex;
      justify-content: space-between;
      margin-top: 7px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .popup-train .row b { color: var(--text); }
    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
      margin-top: 8px;
      letter-spacing: .5px;
    }
    .badge.moving   { background: rgba(64,192,87,.15);  color: var(--green); border: 1px solid rgba(64,192,87,.3); }
    .badge.stopped  { background: rgba(245,159,0,.15);  color: var(--amber); border: 1px solid rgba(245,159,0,.3); }
    .badge.night    { background: rgba(51,154,240,.15); color: var(--blue);  border: 1px solid rgba(51,154,240,.3); }

    .popup-spot { padding: 10px 13px; min-width: 160px; }
    .popup-spot .title { font-family: var(--font-head); font-size: 18px; font-weight: 700; color: var(--amber); }
    .popup-spot .desc  { font-size: 11px; color: var(--text-dim); margin-top: 5px; line-height: 1.5; }

    /* ── TRAIN ICON ── */
    .train-marker {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
      transition: transform .1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 28px;
    }
    .train-marker.moving  { background: rgba(64,192,87,.18); border-color: var(--green); color: var(--green); }
    .train-marker.stopped { background: rgba(245,159,0,.18); border-color: var(--amber); color: var(--amber); }
    .train-marker.night   { background: rgba(51,154,240,.18); border-color: var(--blue);  color: var(--blue); }

    /* Custom map attribution */
    .leaflet-control-attribution {
      background: rgba(7,9,11,.85) !important;
      color: var(--text-dim) !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: var(--amber-dim) !important; }

    /* ── LEGEND ── */
    #legend {
      position: absolute;
      bottom: 28px; right: 10px;
      z-index: 800;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 13px;
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.9;
      pointer-events: none;
    }
    #legend .li { display: flex; align-items: center; gap: 7px; }
    .swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── REFRESH BTN ── */
    #refresh-btn {
      position: absolute;
      top: 70px; right: 10px;
      z-index: 800;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .15s;
    }
    #refresh-btn:hover { border-color: var(--amber); color: var(--amber); }

    /* ── LOADING OVERLAY ── */
    #loader {
      position: absolute;
      inset: 0;
      background: rgba(7,9,11,.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 2px;
      gap: 16px;
    }
    #loader .sub { font-size: 12px; font-family: var(--font-mono); color: var(--text-dim); font-weight: 400; letter-spacing: .5px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* mobile tweaks */
    @media (max-width: 600px) {
      .logo span { display: none; }
      #legend { display: none; }
      .layer-btns { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🚆 JunaSpotti <span>/ LIVE</span></div>

  <div class="filters">
    <button class="btn active" data-filter="all">Kaikki junat</button>
    <button class="btn" data-filter="stopped">Pysähtyneet</button>
    <button class="btn" data-filter="night">Yöseisonta</button>
  </div>

  <div class="layer-btns">
    <button class="layer-btn on amber" id="toggle-spots">▲ Spottipaikat</button>
    <button class="layer-btn on" id="toggle-stations">● Asemat</button>
  </div>
</header>

<div id="statusbar">
  <span id="status-dot"><span class="dot"></span>Yhdistetään...</span>
  <span id="train-count">—</span>
  <span id="last-update">—</span>
  <span style="margin-left:auto; font-size:9px;">rata.digitraffic.fi</span>
</div>

<div id="map">
  <div id="loader">
    <div class="spinner"></div>
    LADATAAN JUNIA
    <div class="sub">Haetaan reaaliaikaista dataa...</div>
  </div>
</div>

<div id="refresh-btn" title="Päivitä junat">↺ Päivitä</div>

<div id="legend">
  <div class="li"><span class="swatch" style="background:var(--green)"></span> Liikkuva juna</div>
  <div class="li"><span class="swatch" style="background:var(--amber)"></span> Pysähtynyt</div>
  <div class="li"><span class="swatch" style="background:var(--blue)"></span> Yöseisonta</div>
  <div class="li"><span class="swatch" style="background:#9b59b6;border-radius:0"></span> Ratapihoja</div>
  <div class="li"><span style="font-size:12px">▲</span> Spottipaikka</div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────
const API_BASE      = 'https://rata.digitraffic.fi/api/v1';
const REFRESH_MS    = 15_000;
const NIGHT_MIN     = 20;   // minutes stopped → yöseisonta
const STOPPED_KMH   = 2;    // km/h threshold

// ── KNOWN SPOTTING LOCATIONS (katselupaikat) ─────────────────────────
const SPOTS = [
  { name:'Pasila / Pohjois-Pasila', lat:60.210, lng:24.935, desc:'Hyvä näkymä Helsingin pääradan juniin. Sillalta näkee ohikulkevia IC- ja S-junia.' },
  { name:'Tikkurilan silta', lat:60.294, lng:25.044, desc:'Päärata – vilkas rataosuus. IC, S3, S220 ja tavaraveturit kulkevat tihein välein.' },
  { name:'Tampereen asema (ulkopuoli)', lat:61.498, lng:23.774, desc:'Tampere on Suomen rautatieristeysasema. Kaikki pääradan junat pysähtyvät tässä.' },
  { name:'Riihimäki ratapihan reuna', lat:60.740, lng:24.773, desc:'Iso ratapiha, jossa näkee vaihtotyötä ja tavarajunia.' },
  { name:'Toijala / Akaa', lat:61.172, lng:23.848, desc:'Rautatieristeys: Tampere–Helsinki ja Tampere–Turku haarautuvat tässä.' },
  { name:'Kouvola asema-alue', lat:60.868, lng:26.702, desc:'Kouvola on Itä-Suomen rautatieristeysasema. Suuri tavaraliikenteen solmukohta.' },
  { name:'Oulu asema', lat:65.012, lng:25.472, desc:'Pohjois-Suomen suurin asema. IC- ja Pendolino-junat sekä tavaraliikenteen veturit.' },
  { name:'Seinäjoki ratapihan reuna', lat:62.787, lng:22.835, desc:'Rautatieristeysasema – Pohjanmaan ja Seinäjoki–Oulu radat kohtaavat.' },
  { name:'Jyväskylä asema', lat:62.243, lng:25.752, desc:'Keski-Suomen solmukohta. Kaupunkiratojen lisäksi IC-liikennettä.' },
  { name:'Lahden asema', lat:60.972, lng:25.654, desc:'Oikoradalla nopeita IC- ja S-junia, nopea Allegro-rata sivuaa tätä.' },
  { name:'Salo asema / rataosuus', lat:60.385, lng:23.128, desc:'Turun rata – näkee nopeiden Pendolino-junien ohiajoja.' },
  { name:'Turku asema', lat:60.453, lng:22.270, desc:'Etelä-Suomen tärkeä solmuasema, IC ja alueelliset junat.' },
];

// ── MAP INIT ─────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [64.2, 26.0],
  zoom: 6,
  zoomControl: true,
  attributionControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// ── LAYER GROUPS ─────────────────────────────────────────────────────
const trainLayer   = L.layerGroup().addTo(map);
const spotLayer    = L.layerGroup().addTo(map);
const stationLayer = L.layerGroup().addTo(map);

// ── STATE ─────────────────────────────────────────────────────────────
let activeFilter    = 'all';
let showSpots       = true;
let showStations    = true;
let allTrainData    = [];
let stoppedSince    = {};   // trainNumber → Date
let refreshTimer    = null;

// ── HELPERS ──────────────────────────────────────────────────────────
function trainStatus(speed) {
  if (speed > STOPPED_KMH) return 'moving';
  return 'stopped';
}

function nightStatus(trainNum, speed) {
  if (speed > STOPPED_KMH) {
    delete stoppedSince[trainNum];
    return 'moving';
  }
  if (!stoppedSince[trainNum]) stoppedSince[trainNum] = new Date();
  const mins = (Date.now() - stoppedSince[trainNum]) / 60000;
  return mins >= NIGHT_MIN ? 'night' : 'stopped';
}

function statusLabel(s) {
  return { moving: 'Liikkuu', stopped: 'Pysähtynyt', night: 'Yöseisonta' }[s];
}

function minutesStopped(trainNum) {
  if (!stoppedSince[trainNum]) return 0;
  return Math.round((Date.now() - stoppedSince[trainNum]) / 60000);
}

// ── TRAIN MARKERS ─────────────────────────────────────────────────────
function buildTrainIcon(num, status) {
  const label = String(num).slice(0, 5);
  return L.divIcon({
    className: '',
    html: `<div class="train-marker ${status}" title="Juna ${num}">${label}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -16],
  });
}

function buildPopup(t) {
  const s = t._status;
  const mins = minutesStopped(t.trainNumber);
  const eta = s === 'night' ? `${mins} min sitten pysähtynyt` :
              s === 'stopped' && mins > 0 ? `Pysähtynyt ${mins} min sitten` : '';
  return `
    <div class="popup-train">
      <div class="num">Juna ${t.trainNumber}</div>
      <div class="row"><span>Nopeus</span><b>${Math.round(t.speed)} km/h</b></div>
      <div class="row"><span>Tila</span><b>${statusLabel(s)}</b></div>
      ${eta ? `<div class="row"><span>${eta}</span></div>` : ''}
      <div><span class="badge ${s}">${statusLabel(s).toUpperCase()}</span></div>
    </div>`;
}

function renderTrains(data) {
  trainLayer.clearLayers();
  const filtered = data.filter(t => {
    if (activeFilter === 'all')     return true;
    if (activeFilter === 'stopped') return t._status === 'stopped' || t._status === 'night';
    if (activeFilter === 'night')   return t._status === 'night';
    return true;
  });

  filtered.forEach(t => {
    const marker = L.marker([t.location.coordinates[1], t.location.coordinates[0]], {
      icon: buildTrainIcon(t.trainNumber, t._status),
      zIndexOffset: t._status === 'moving' ? 0 : 100,
    });
    marker.bindPopup(buildPopup(t), { className: '' });
    trainLayer.addLayer(marker);
  });
}

// ── SPOT MARKERS ─────────────────────────────────────────────────────
function buildSpotIcon() {
  return L.divIcon({
    className: '',
    html: `<div style="
      color:#f59f00; font-size:18px; line-height:1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.7));
      text-shadow: 0 0 8px rgba(245,159,0,.5);
    ">▲</div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 16],
    popupAnchor: [0, -18],
  });
}

SPOTS.forEach(s => {
  const m = L.marker([s.lat, s.lng], { icon: buildSpotIcon() });
  m.bindPopup(`
    <div class="popup-spot">
      <div class="title">📷 ${s.name}</div>
      <div class="desc">${s.desc}</div>
    </div>`, { className: '' });
  spotLayer.addLayer(m);
});

// ── STATION MARKERS ───────────────────────────────────────────────────
async function loadStations() {
  try {
    const res  = await fetch(`${API_BASE}/metadata/stations`);
    const data = await res.json();
    data.filter(s => s.passengerTraffic).forEach(s => {
      const circle = L.circleMarker([s.latitude, s.longitude], {
        radius: 4,
        fillColor: '#9b59b6',
        fillOpacity: .7,
        color: '#6c3483',
        weight: 1,
      });
      circle.bindTooltip(s.stationName, {
        permanent: false,
        className: '',
        direction: 'top',
        offset: [0, -4],
      });
      stationLayer.addLayer(circle);
    });
  } catch(e) {
    console.warn('Asemadata ei saatavilla', e);
  }
}

// ── FETCH TRAINS ──────────────────────────────────────────────────────
async function fetchTrains() {
  const dot    = document.getElementById('status-dot');
  const count  = document.getElementById('train-count');
  const update = document.getElementById('last-update');

  try {
    const res  = await fetch(`${API_BASE}/train-locations/latest/`);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    allTrainData = data.map(t => ({
      ...t,
      _status: nightStatus(t.trainNumber, t.speed),
    }));

    renderTrains(allTrainData);

    const moving  = allTrainData.filter(t => t._status === 'moving').length;
    const stopped = allTrainData.filter(t => t._status === 'stopped').length;
    const night   = allTrainData.filter(t => t._status === 'night').length;

    count.textContent = `${allTrainData.length} junaa  ·  🟢 ${moving} liikkuu  ·  🟡 ${stopped} pys.  ·  🔵 ${night} yö`;
    update.textContent = `Päivitetty ${new Date().toLocaleTimeString('fi-FI')}`;
    dot.innerHTML = `<span class="dot live"></span>LIVE`;

    document.getElementById('loader').style.display = 'none';
  } catch(e) {
    dot.innerHTML = `<span class="dot err"></span>Virhe: ${e.message}`;
    document.getElementById('loader').style.display = 'none';
    console.error('fetchTrains error:', e);
  }
}

// ── AUTO REFRESH ──────────────────────────────────────────────────────
function startRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(fetchTrains, REFRESH_MS);
}

// ── FILTER BUTTONS ────────────────────────────────────────────────────
document.querySelectorAll('.btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderTrains(allTrainData);
  });
});

// ── LAYER TOGGLES ────────────────────────────────────────────────────
document.getElementById('toggle-spots').addEventListener('click', function() {
  showSpots = !showSpots;
  showSpots ? map.addLayer(spotLayer) : map.removeLayer(spotLayer);
  this.classList.toggle('on', showSpots);
});

document.getElementById('toggle-stations').addEventListener('click', function() {
  showStations = !showStations;
  showStations ? map.addLayer(stationLayer) : map.removeLayer(stationLayer);
  this.classList.toggle('on', showStations);
});

// ── REFRESH BUTTON ────────────────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', () => {
  document.getElementById('loader').style.display = 'flex';
  fetchTrains();
  startRefresh();
});

// ── INIT ──────────────────────────────────────────────────────────────
(async () => {
  await loadStations();
  await fetchTrains();
  startRefresh();
})();
</script>
</body>
</html>
