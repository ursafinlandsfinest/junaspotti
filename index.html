<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>🚂 JunaSpotti</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#070a0e;--panel:#0d1117;--p2:#111820;--bdr:#1c2530;
      --amber:#f59f00;--blue:#1971c2;--green:#2f9e44;--greenb:#69db7c;
      --org:#e8590c;--blueb:#74c0fc;--text:#c9d1d9;--tdim:#586069;
      --fh:'Barlow Condensed',sans-serif;--fm:'IBM Plex Mono',monospace;
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:var(--fm);
      display:flex;
      flex-direction:column;
      height:100dvh;
    }

    #hdr{background:var(--panel);border-bottom:2px solid var(--bdr);padding:0 12px;height:50px;display:flex;align-items:center;}

    #map{flex:1;min-height:0;position:relative;overflow:hidden;}

    #sp-list,#rp-scroll{
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
    }

    #lpanel,#rpanel{
      position:absolute;top:0;bottom:0;z-index:490;
      background:var(--panel);
      display:flex;flex-direction:column;
      transition:transform .28s ease;
    }

    #lpanel{left:0;width:min(290px,88vw);transform:translateX(-100%);}
    #rpanel{right:0;width:min(270px,88vw);transform:translateX(100%);}

    #lpanel.open{transform:translateX(0);}
    #rpanel.open{transform:translateX(0);}
  </style>
</head>

<body>

<div id="hdr">🚂 JunaSpotti</div>
<div id="map"></div>

<script>
const API='https://rata.digitraffic.fi/api/v1';
const REFRESH=12000;

const map=L.map('map',{center:[64.2,26.0],zoom:6});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

/* ✔️ KAIKKI LAYERIT */
const LG={
  trains:L.layerGroup().addTo(map),
  yards:L.layerGroup().addTo(map),
  crossing:L.layerGroup().addTo(map),
  spots:L.layerGroup().addTo(map)
};

/* ✔️ OLETUS: VAIN KATSELUPAIKAT */
map.removeLayer(LG.yards);
map.removeLayer(LG.crossing);

/* DATA */
let allTrains=[];

function render(data){
  LG.trains.clearLayers();

  data.forEach(t=>{
    L.marker([t.location.coordinates[1],t.location.coordinates[0]])
      .addTo(LG.trains);
  });
}

/* FETCH */
async function fetchLocs(){
  const res=await fetch(`${API}/train-locations/latest/`);
  const data=await res.json();
  allTrains=data;
  render(allTrains);
}

/* INIT */
fetchLocs();
setInterval(fetchLocs,REFRESH);
</script>

</body>
</html>
